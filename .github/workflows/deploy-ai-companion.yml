name: Deploy ai-companion.com to Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'ai-companion.com/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FAE_WEB_PRESENCE }}'
          projectId: fae-web-presence
          target: ai-companion-com
          channelId: live
